<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVIDIA NIM Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0c10;
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      margin: 0;
      color: #eef2f9;
      height: 100vh;
    }

    .app {
      display: flex;
      width: 100vw;
      max-width: none;
      height: 100vh;
      max-height: none;
      background: rgba(18, 22, 28, 0.95);
      border: 0;
      border-radius: 0;
      overflow: hidden;
    }

    .sidebar {
      width: 240px;
      min-width: 240px;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 14px 10px;
      flex-shrink: 0;
    }

    .new-thread-btn {
      width: 100%;
      background: rgba(124,92,252,0.15);
      border: 1px solid rgba(124,92,252,0.35);
      color: #cdbfff;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .thread-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .thread-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 9px 10px;
      border-radius: 10px;
      font-size: 13px;
      color: #b6c2da;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .thread-item:hover { background: rgba(255,255,255,0.04); }
    .thread-item.active { background: rgba(124,92,252,0.15); border-color: rgba(124,92,252,0.3); color: #f0f4fe; }

    .thread-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .thread-delete {
      opacity: 0;
      background: none;
      border: none;
      color: #8896b0;
      font-size: 13px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
    }
    .thread-item:hover .thread-delete { opacity: 1; }
    .thread-delete:hover { color: #ff8a8a; }

    .thread-empty {
      color: #6a7a94;
      font-size: 12px;
      padding: 10px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-box {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px 10px;
      color: #eef2f9;
      font-size: 13px;
      max-width: 260px;
      outline: none;
    }
    select option { background: #1a1f29; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #7c5cfc;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      border-bottom-left-radius: 4px;
    }

    .msg.error {
      align-self: center;
      background: rgba(255,80,80,0.12);
      color: #ff8a8a;
      border: 1px solid rgba(255,80,80,0.3);
      font-size: 13px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .launcher-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      color: #cdbfff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .launcher-link:hover {
      text-decoration: underline;
    }

    textarea {
      flex: 1;
      resize: none;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      color: #eef2f9;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      max-height: 120px;
    }

    button {
      background: #7c5cfc;
      border: none;
      color: white;
      border-radius: 12px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
  <link rel="stylesheet" href="/assets/ui.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <button class="new-thread-btn" id="newThreadBtn">+ New chat</button>
        <a class="launcher-link" href="/launcher.html">Open output launcher</a>
      </div>
      <div class="thread-list" id="threadList"></div>
    </div>
    <div class="main">
      <div class="chat-box">
        <div class="header">
          <div style="display:flex;align-items:center;gap:14px;width:100%;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:14px;">
              <h1>NVIDIA NIM Chat</h1>
              <nav class="navlinks" aria-label="Main navigation" style="margin-left:12px;">
                <a href="/">Home</a>
                <a href="/studio">Studio</a>
                <a href="/launcher.html">Launcher</a>
              </nav>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <select id="modelSelect"></select>
            </div>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-row">
          <div class="input-filepicker filepicker" title="Attach a text file">
            <input id="appFile" type="file" accept=".txt,.md,.json,.js,.jsx,.ts,.tsx,.py,.csv,.html,.css,.xml,.yaml,.yml,.sql,.sh,.bash" />
            <button class="btn" type="button">Attach</button>
            <div class="filename">No file</div>
          </div>
          <textarea id="input" rows="1" placeholder="Type a message..."></textarea>
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // load shared UI behavior
    const script = document.createElement('script');
    script.src = '/assets/ui.js';
    script.defer = true;
    document.head.appendChild(script);
    const modelSelect = document.getElementById('modelSelect');
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const threadListEl = document.getElementById('threadList');
    const newThreadBtn = document.getElementById('newThreadBtn');

    let history = [];
    let currentThreadId = null;
    let threads = [];
    let attachedFile = null;
    let attachedFileSent = false;

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      // Render Markdown if marked is available and sanitize with DOMPurify
      try {
        const raw = (text == null) ? '' : String(text);
        const html = (window.marked && typeof window.marked.parse === 'function') ? window.marked.parse(raw) : raw.replace(/</g,'&lt;');
        const safe = (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') ? window.DOMPurify.sanitize(html) : html;
        div.innerHTML = `<div class="prose">${safe}</div>`;
      } catch (e) {
        div.textContent = text;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function loadModels() {
      try {
        const res = await fetch('/api/chat?list=models');
        const data = await res.json();
        modelSelect.innerHTML = '';
        (data.models || []).forEach((m) => {
          const opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          modelSelect.appendChild(opt);
        });
        // restore saved selection if present, otherwise default to "moonshot kimi" if available
        try {
          const saved = localStorage.getItem('selectedModel');
          if (saved) {
            modelSelect.value = saved;
            modelSelect.dispatchEvent(new Event('change'));
          } else {
            const preferred = Array.from(modelSelect.options).map(o=>o.value).find(v=>/moonshot[\s_\-]?kimi/i.test(v));
            if (preferred) {
              modelSelect.value = preferred;
              try { localStorage.setItem('selectedModel', preferred); } catch(_){}
              modelSelect.dispatchEvent(new Event('change'));
            }
          }
        } catch(_) {}
      } catch (err) {
        addMessage('error', 'Failed to load model list: ' + err.message);
      }
    }

    function renderThreadList() {
      threadListEl.innerHTML = '';
      if (threads.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'thread-empty';
        empty.textContent = 'No conversations yet';
        threadListEl.appendChild(empty);
        return;
      }
      threads.forEach((t) => {
        const item = document.createElement('div');
        item.className = 'thread-item' + (t.id === currentThreadId ? ' active' : '');

        const title = document.createElement('span');
        title.className = 'thread-title';
        title.textContent = t.title || 'New conversation';
        item.appendChild(title);

        const del = document.createElement('button');
        del.className = 'thread-delete';
        del.textContent = '✕';
        del.title = 'Delete conversation';
        del.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteThread(t.id);
        });
        item.appendChild(del);

        item.addEventListener('click', () => selectThread(t.id));
        threadListEl.appendChild(item);
      });
    }

    async function loadThreads() {
      try {
        const res = await fetch('/api/threads');
        const data = await res.json();
        threads = data.threads || [];
        renderThreadList();
      } catch (err) {
        // Thread list is a nice-to-have; don't block chat if it fails
        // (e.g. DATABASE_URL not configured).
        threadListEl.innerHTML = '<div class="thread-empty">History unavailable</div>';
      }
    }

    async function selectThread(threadId) {
      try {
        const res = await fetch('/api/threads/' + threadId);
        if (!res.ok) throw new Error('Failed to load conversation');
        const data = await res.json();

        currentThreadId = threadId;
        history = (data.messages || []).map((m) => ({ role: m.role, content: m.content }));
        if (data.thread && data.thread.model) {
          modelSelect.value = data.thread.model;
        }

        messagesEl.innerHTML = '';
        history.forEach((m) => addMessage(m.role, m.content));
        renderThreadList();
      } catch (err) {
        addMessage('error', 'Failed to open conversation: ' + err.message);
      }
    }

    function startNewThread() {
      currentThreadId = null;
      history = [];
      messagesEl.innerHTML = '';
      attachedFile = null;
      attachedFileSent = false;
      renderThreadList();
    }

    async function deleteThread(threadId) {
      try {
        await fetch('/api/threads/' + threadId, { method: 'DELETE' });
        threads = threads.filter((t) => t.id !== threadId);
        if (currentThreadId === threadId) {
          startNewThread();
        } else {
          renderThreadList();
        }
      } catch (err) {
        addMessage('error', 'Failed to delete conversation: ' + err.message);
      }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;

      const wasNewThread = !currentThreadId;

      // If a file is attached and hasn't been sent for this thread, include it as a system message
      if (attachedFile && !attachedFileSent) {
        try {
          const fileText = await attachedFile.text();
          const sysContent = `Attached file: ${attachedFile.name}\n\n${fileText}`;
          history.push({ role: 'system', content: sysContent });
          attachedFileSent = true;
        } catch (err) {
          addMessage('error', 'Failed to read attached file: ' + err.message);
        }
      }

      history.push({ role: 'user', content: text });
      addMessage('user', text);

      const assistantDiv = addMessage('assistant', '');
      let accumulated = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: history,
            model: modelSelect.value,
            stream: true,
            threadId: currentThreadId,
          }),
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || ('Request failed: ' + res.status));
        }

        const returnedThreadId = res.headers.get('X-Thread-Id');
        if (returnedThreadId) currentThreadId = returnedThreadId;

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data:')) continue;
            const payload = trimmed.slice(5).trim();
            if (payload === '[DONE]') continue;
            try {
              const data = JSON.parse(payload);
              const delta = data.choices?.[0]?.delta?.content;
              if (delta) {
                accumulated += delta;
                assistantDiv.textContent = accumulated;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              }
            } catch (_) {
              // ignore partial/malformed chunk
            }
          }
        }

        history.push({ role: 'assistant', content: accumulated });

        // Refresh the sidebar so a brand-new thread (and its
        // auto-generated title) shows up.
        if (wasNewThread) await loadThreads();
      } catch (err) {
        assistantDiv.classList.remove('assistant');
        assistantDiv.classList.add('error');
        assistantDiv.textContent = 'Error: ' + err.message;
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    newThreadBtn.addEventListener('click', startNewThread);

    // wire file input
    const appFileInput = document.getElementById('appFile');
    if (appFileInput) {
      appFileInput.addEventListener('change', (e) => {
        attachedFile = appFileInput.files[0] || null;
        attachedFileSent = false;
      });
    }

    // save model selection to localStorage when changed
    if (modelSelect) {
      modelSelect.addEventListener('change', ()=>{
        try { localStorage.setItem('selectedModel', modelSelect.value); } catch(_){}
      });
    }

    loadModels();
    loadThreads();
  </script>
</body>
</html>
